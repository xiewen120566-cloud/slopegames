# Wrangler TOML 配置文件，等价于原 JSON 版本

"$schema" = "node_modules/wrangler/config-schema.json"
name = "slopegames"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
upload_source_maps = true
pages_build_output_dir = ".vercel/output/static"
# 自定义域名路由绑定
route = "slopegames.net/*"

[build]
command = "node -e \"require('fs').rmSync('.open-next',{recursive:true,force:true})\" && opennextjs-cloudflare build"

# 可观测性配置
[observability]
enabled = true

# Worker 的部署位置策略
[placement]
mode = "smart"

# Worker 限制设置
[limits]
cpu_ms = 300000

# 环境变量
[vars]
BASE_URL = "https://slopegames.net"

